name: Build Windows

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build EXE
        shell: pwsh
        run: |
          pyinstaller --onefile --windowed --name DiskAnalyzer `
            --icon=app.ico `
            --add-data "app.ico;." `
            --add-data "README.md;." `
            disk_analyzer.py

      - uses: actions/upload-artifact@v4
        with:
          name: DiskAnalyzer-Windows
          path: dist/DiskAnalyzer.exe